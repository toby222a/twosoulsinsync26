<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#6f0f2f">
<meta name="description" content="Traditional wedding celebration of Esther Oluwademilade and Oluwatobi Akinwamide on 15 October 2026 in Osogbo.">
<title>Esther & Oluwatobi | Two Souls In Sync '26</title>
<style>
:root {
  --cream:#fbf6ec;
  --paper:#fffdf8;
  --burgundy:#6f0f2f;
  --green:#0f5a43;
  --gold:#b9934c;
  --ink:#30271f;
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{margin:0;font-family:Georgia,"Times New Roman",serif;background:var(--cream);color:var(--ink);line-height:1.6;overflow-x:hidden}
img{max-width:100%;display:block}
a{color:inherit}
button,input,select,textarea{font:inherit}
.hidden{display:none!important}

.intro{position:fixed;inset:0;z-index:100;background:linear-gradient(145deg,#2e141b,#6f0f2f);display:grid;place-items:center;text-align:center;color:white;padding:24px;transition:opacity .7s ease,visibility .7s ease}
.intro.hide{opacity:0;visibility:hidden}
.intro-box{max-width:620px}
.intro h1{font-size:clamp(3rem,11vw,6rem);line-height:.95;margin:.25em 0}
.intro p{letter-spacing:.16em;text-transform:uppercase;font-size:.82rem;color:#f1d49b}
.open-btn{margin-top:24px;border:1px solid #efd18c;background:#efd18c;color:#3d2319;padding:14px 24px;border-radius:999px;font-weight:700;cursor:pointer}

.nav{position:fixed;top:0;left:0;right:0;z-index:30;display:flex;justify-content:space-between;align-items:center;padding:14px 5%;background:rgba(251,246,236,.9);backdrop-filter:blur(12px);border-bottom:1px solid rgba(185,147,76,.3)}
.brand{font-weight:700;color:var(--burgundy);letter-spacing:.04em}
.menu{display:flex;gap:16px;font-size:.92rem}
.menu a{text-decoration:none}
.music-btn{position:fixed;right:18px;bottom:18px;z-index:40;width:48px;height:48px;border-radius:50%;border:1px solid rgba(185,147,76,.5);background:var(--paper);color:var(--burgundy);box-shadow:0 8px 24px rgba(0,0,0,.15);cursor:pointer}

.hero{min-height:100vh;position:relative;display:grid;place-items:center;text-align:center;color:white;padding:100px 20px 50px;overflow:hidden;background:#2f1c20}
.hero::before{content:"";position:absolute;inset:0;background-size:cover;background-position:center;animation:heroSlides 24s infinite;filter:brightness(.48)}
@keyframes heroSlides {
  0%,20%{background-image:url('assets/photo-01.jpeg')}
  25%,45%{background-image:url('assets/photo-02.jpeg')}
  50%,70%{background-image:url('assets/photo-03.jpeg')}
  75%,100%{background-image:url('assets/photo-04.jpeg')}
}
.hero::after{content:"";position:absolute;inset:0;background:linear-gradient(rgba(31,15,18,.15),rgba(31,15,18,.68))}
.hero-card{position:relative;z-index:2;max-width:780px}
.eyebrow{text-transform:uppercase;letter-spacing:.22em;font-size:.78rem;color:#f5dfb1}
h1{font-size:clamp(3rem,10vw,6.8rem);line-height:.95;margin:.25em 0 .15em;font-weight:500}
.amp{color:#f1d48e;font-style:italic}
.subtitle{font-size:1.08rem;letter-spacing:.12em;text-transform:uppercase}
.actions{display:flex;flex-wrap:wrap;gap:12px;justify-content:center;margin-top:30px}
.btn{padding:13px 20px;border-radius:999px;text-decoration:none;border:1px solid #f2d79b;background:#f2d79b;color:#402316;font-weight:700;display:inline-block}
.btn.alt{background:transparent;color:white}
.countdown{margin-top:32px;display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.countdown div{background:rgba(255,255,255,.12);padding:12px;border:1px solid rgba(255,255,255,.28);border-radius:14px}
.countdown strong{font-size:1.5rem;display:block}

.petal{position:fixed;top:-10vh;z-index:15;pointer-events:none;opacity:.45;animation:fall linear infinite}
@keyframes fall{to{transform:translate3d(40px,115vh,0) rotate(540deg)}}

section{padding:80px 7%}
.reveal{opacity:0;transform:translateY(24px);transition:.7s ease}
.reveal.visible{opacity:1;transform:none}
.section-title{text-align:center;color:var(--burgundy);font-size:clamp(2rem,5vw,3.4rem);margin:0 0 12px}
.section-kicker{text-align:center;color:var(--gold);letter-spacing:.16em;text-transform:uppercase;font-size:.8rem}
.story{max-width:850px;margin:0 auto;text-align:center;font-size:1.06rem}
.details-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:18px;max-width:1000px;margin:35px auto 0}
.card{background:var(--paper);border:1px solid rgba(185,147,76,.35);padding:28px;border-radius:18px;box-shadow:0 10px 30px rgba(77,48,30,.06);text-align:center}
.card h3{color:var(--green);margin-top:0}
.gallery{columns:3 280px;column-gap:14px;margin-top:35px}
.gallery-item{display:block;width:100%;padding:0;border:0;background:none;margin:0 0 14px;break-inside:avoid;cursor:pointer}
.gallery img{width:100%;border-radius:14px;box-shadow:0 8px 24px rgba(52,35,25,.12);transition:transform .3s ease}
.gallery-item:hover img{transform:scale(1.02)}
.palette{display:flex;justify-content:center;flex-wrap:wrap;gap:20px;margin-top:35px}
.swatch{width:130px;text-align:center}
.circle{width:86px;height:86px;border-radius:50%;margin:0 auto 10px;border:5px solid white;box-shadow:0 4px 16px rgba(0,0,0,.15)}
.rsvp{max-width:720px;margin:30px auto 0;background:var(--paper);padding:30px;border-radius:18px;border:1px solid rgba(185,147,76,.35)}
form{display:grid;gap:14px}
input,select,textarea{width:100%;padding:14px;border-radius:10px;border:1px solid #d7c9b3;background:white}
textarea{min-height:120px;resize:vertical}
button{border:0}
.contact{text-align:center;margin-top:22px}
footer{background:#2f1c20;color:#f8ead1;text-align:center;padding:45px 20px}
.small{font-size:.9rem;opacity:.85}

.lightbox{position:fixed;inset:0;z-index:90;background:rgba(20,12,14,.94);display:none;place-items:center;padding:20px}
.lightbox.open{display:grid}
.lightbox img{max-width:min(100%,1000px);max-height:88vh;border-radius:14px}
.lightbox button{position:absolute;top:18px;right:18px;width:44px;height:44px;border-radius:50%;background:white;font-size:1.4rem;cursor:pointer}

@media(max-width:760px){
  .menu{display:none}
  .details-grid{grid-template-columns:1fr}
  .countdown{grid-template-columns:repeat(2,1fr)}
  section{padding:65px 20px}
}
</style>
</head>
<body>

<div class="intro" id="intro">
  <div class="intro-box">
    <p>#TwoSoulsInSync26</p>
    <h1>Esther <span class="amp">&</span><br>Oluwatobi</h1>
    <div>Thursday, 15 October 2026</div>
    <button class="open-btn" id="openInvitation">Open Invitation</button>
  </div>
</div>

<audio id="music" loop preload="auto" src="assets/wedding-theme.wav"></audio>
<button class="music-btn" id="musicBtn" aria-label="Play or pause music">♪</button>

<nav class="nav">
  <div class="brand">#TwoSoulsInSync26</div>
  <div class="menu">
    <a href="#story">Our Story</a>
    <a href="#details">Details</a>
    <a href="#gallery">Gallery</a>
    <a href="#rsvp">RSVP</a>
  </div>
</nav>

<header class="hero">
  <div class="hero-card">
    <div class="eyebrow">Traditional Wedding</div>
    <h1>Esther <span class="amp">&</span><br>Oluwatobi</h1>
    <div class="subtitle">Thursday, 15 October 2026 · 12:00 PM</div>

    <div class="countdown">
      <div><strong id="days">0</strong>Days</div>
      <div><strong id="hours">0</strong>Hours</div>
      <div><strong id="minutes">0</strong>Minutes</div>
      <div><strong id="seconds">0</strong>Seconds</div>
    </div>

    <div class="actions">
      <a class="btn" href="#details">View Details</a>
      <a class="btn alt" href="#rsvp">RSVP</a>
    </div>
  </div>
</header>

<section id="story" class="reveal">
  <div class="section-kicker">How it began</div>
  <h2 class="section-title">Our Story</h2>
  <div class="story">
    <p>Our story began when Oluwatobi followed his friend, Pepe, to visit his brother at Esther’s family home. That simple visit became the beginning of something special.</p>
    <p>Over time, friendship grew into love. Oluwatobi knew Esther was the one because of her kind and caring nature. In his words, “She has a heart of gold.”</p>
    <p>The proposal was a complete surprise. Oluwatobi travelled to Nigeria without Esther knowing and planned the moment in secret. It became a memory they will always treasure.</p>
  </div>
</section>

<section id="details" class="reveal" style="background:#f4ecdf">
  <div class="section-kicker">Celebrate with us</div>
  <h2 class="section-title">Wedding Details</h2>
  <div class="details-grid">
    <div class="card"><h3>Date</h3><p>Thursday<br><strong>15 October 2026</strong></p></div>
    <div class="card"><h3>Time</h3><p><strong>12:00 PM</strong></p><a class="btn" href="wedding-date.ics" download>Add to Calendar</a></div>
    <div class="card">
      <h3>Venue</h3>
      <p><strong>Oasis Event Centre</strong><br>No. 2 Ezekiel Oyemoni Street,<br>off Agunbelewo Road,<br>behind JAMB Office,<br>Osogbo, Osun State, Nigeria.</p>
      <a class="btn" target="_blank" rel="noopener" href="https://www.google.com/maps/search/?api=1&query=No+2+Ezekiel+Oyemoni+Street+off+Agunbelewo+Road+behind+JAMB+Office+Osogbo">Get Directions</a>
    </div>
  </div>
</section>

<section class="reveal">
  <div class="section-kicker">Our colours</div>
  <h2 class="section-title">Dress Code</h2>
  <div class="palette">
    <div class="swatch"><div class="circle" style="background:#0f5a43"></div>Emerald Green</div>
    <div class="swatch"><div class="circle" style="background:#6f0f2f"></div>Burgundy</div>
    <div class="swatch"><div class="circle" style="background:#b9934c"></div>Gold</div>
  </div>
</section>

<section id="gallery" class="reveal" style="background:#f4ecdf">
  <div class="section-kicker">Memories</div>
  <h2 class="section-title">Our Gallery</h2>
  <div class="gallery"><button class="gallery-item" data-src="assets/photo-01.jpeg" aria-label="Open photo"><img loading="lazy" src="assets/photo-01.jpeg" alt="Esther and Oluwatobi"></button>
<button class="gallery-item" data-src="assets/photo-02.jpeg" aria-label="Open photo"><img loading="lazy" src="assets/photo-02.jpeg" alt="Esther and Oluwatobi"></button>
<button class="gallery-item" data-src="assets/photo-03.jpeg" aria-label="Open photo"><img loading="lazy" src="assets/photo-03.jpeg" alt="Esther and Oluwatobi"></button>
<button class="gallery-item" data-src="assets/photo-04.jpeg" aria-label="Open photo"><img loading="lazy" src="assets/photo-04.jpeg" alt="Esther and Oluwatobi"></button>
<button class="gallery-item" data-src="assets/photo-05.jpeg" aria-label="Open photo"><img loading="lazy" src="assets/photo-05.jpeg" alt="Esther and Oluwatobi"></button>
<button class="gallery-item" data-src="assets/photo-06.jpeg" aria-label="Open photo"><img loading="lazy" src="assets/photo-06.jpeg" alt="Esther and Oluwatobi"></button>
<button class="gallery-item" data-src="assets/photo-07.jpeg" aria-label="Open photo"><img loading="lazy" src="assets/photo-07.jpeg" alt="Esther and Oluwatobi"></button>
<button class="gallery-item" data-src="assets/photo-08.jpeg" aria-label="Open photo"><img loading="lazy" src="assets/photo-08.jpeg" alt="Esther and Oluwatobi"></button>
<button class="gallery-item" data-src="assets/photo-09.jpeg" aria-label="Open photo"><img loading="lazy" src="assets/photo-09.jpeg" alt="Esther and Oluwatobi"></button>
<button class="gallery-item" data-src="assets/photo-10.jpeg" aria-label="Open photo"><img loading="lazy" src="assets/photo-10.jpeg" alt="Esther and Oluwatobi"></button></div>
</section>

<section id="rsvp" class="reveal">
  <div class="section-kicker">Let us know</div>
  <h2 class="section-title">RSVP</h2>
  <div class="rsvp">
    <form id="rsvpForm">
      <input required id="name" placeholder="Your full name">
      <input id="phone" placeholder="Phone number">
      <select id="attendance" required>
        <option value="">Will you attend?</option>
        <option>Yes, I will attend</option>
        <option>Sorry, I cannot attend</option>
      </select>
      <input id="guests" type="number" min="1" value="1" placeholder="Number attending">
      <textarea id="message" placeholder="Message for the couple"></textarea>
      <button class="btn" type="submit">Send RSVP on WhatsApp</button>
    </form>
    <div class="contact">
      <strong>Timilehin:</strong> 08134730912<br>
      <strong>Gbemisola:</strong> 08105370320
    </div>
  </div>
</section>

<footer>
  <div>Esther Oluwademilade & Oluwatobi Akinwamide</div>
  <div class="small">#TwoSoulsInSync26</div>
</footer>

<div class="lightbox" id="lightbox">
  <button id="closeLightbox" aria-label="Close">×</button>
  <img id="lightboxImage" alt="Wedding gallery photo">
</div>

<script>
const intro = document.getElementById('intro');
const music = document.getElementById('music');
const musicBtn = document.getElementById('musicBtn');

document.getElementById('openInvitation').addEventListener('click', async () => {
  intro.classList.add('hide');
  try { await music.play(); musicBtn.textContent = '❚❚'; } catch(e) {}
});

musicBtn.addEventListener('click', async () => {
  if (music.paused) { await music.play(); musicBtn.textContent = '❚❚'; }
  else { music.pause(); musicBtn.textContent = '♪'; }
});

const weddingDate = new Date('2026-10-15T12:00:00+01:00').getTime();
function updateCountdown(){
  const gap = Math.max(0, weddingDate - Date.now());
  document.getElementById('days').textContent = Math.floor(gap / 86400000);
  document.getElementById('hours').textContent = Math.floor((gap % 86400000) / 3600000);
  document.getElementById('minutes').textContent = Math.floor((gap % 3600000) / 60000);
  document.getElementById('seconds').textContent = Math.floor((gap % 60000) / 1000);
}
updateCountdown();
setInterval(updateCountdown, 1000);

document.getElementById('rsvpForm').addEventListener('submit', function(e){
  e.preventDefault();
  const val = id => encodeURIComponent(document.getElementById(id).value);
  const text = `Wedding RSVP%0AName: ${val('name')}%0APhone: ${val('phone')}%0AAttendance: ${val('attendance')}%0ANumber attending: ${val('guests')}%0AMessage: ${val('message')}`;
  window.open(`https://wa.me/2348134730912?text=${text}`, '_blank');
});

const observer = new IntersectionObserver(entries => {
  entries.forEach(entry => { if(entry.isIntersecting) entry.target.classList.add('visible'); });
}, {threshold:.12});
document.querySelectorAll('.reveal').forEach(el => observer.observe(el));

for(let i=0;i<14;i++){
  const p=document.createElement('span');
  p.className='petal';
  p.textContent='❀';
  p.style.left=(Math.random()*100)+'vw';
  p.style.animationDuration=(9+Math.random()*10)+'s';
  p.style.animationDelay=(-Math.random()*15)+'s';
  p.style.fontSize=(10+Math.random()*16)+'px';
  p.style.color=Math.random()>.5?'#b9934c':'#6f0f2f';
  document.body.appendChild(p);
}

const lightbox = document.getElementById('lightbox');
const lightboxImage = document.getElementById('lightboxImage');
document.querySelectorAll('.gallery-item').forEach(btn => {
  btn.addEventListener('click', () => {
    lightboxImage.src = btn.dataset.src;
    lightbox.classList.add('open');
  });
});
document.getElementById('closeLightbox').addEventListener('click',()=>lightbox.classList.remove('open'));
lightbox.addEventListener('click',e=>{if(e.target===lightbox)lightbox.classList.remove('open')});
</script>
</body>
</html>
